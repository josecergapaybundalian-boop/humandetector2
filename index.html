<!DOCTYPE html>
<html>
<head>
    <title>AI Human Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <style>
        video, canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<video id="video" width="720" height="560" autoplay muted></video>

<script>
    const video = document.getElementById('video');

    // Load models from a public repository
    Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
        faceapi.nets.ageGenderNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights')
    ]).then(startVideo);

    function startVideo() {
        navigator.getUserMedia({ video: {} }, stream => video.srcObject = stream, err => console.error(err));
    }

    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.body.append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withAgeAndGender();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            
            resizedDetections.forEach(result => {
                const { age, gender, genderProbability } = result;
                new faceapi.draw.DrawTextField([
                    `${Math.round(age)} years`,
                    `${gender} (${Math.round(genderProbability * 100)}%)`
                ], result.detection.box.bottomRight).draw(canvas);
            });
        }, 100);
    });
</script>
</body>
</html>
